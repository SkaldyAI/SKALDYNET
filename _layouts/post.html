<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | SKALDY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --skaldy-purple: #7b2cbf;
            --text-gray: #e0e0e0;
            --h-white: #ffffff;
        }
        body {
            background-color: var(--obsidian);
            color: var(--text-gray);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.7;
        }
        article {
            max-width: 800px;
            margin: 0 auto;
        }
        .logo-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            max-width: 200px;
            height: auto;
            transition: 0.3s;
        }
        .logo:hover {
            filter: drop-shadow(0 0 10px rgba(123, 44, 191, 0.5));
        }
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: var(--skaldy-purple);
            text-decoration: none;
            font-family: 'Roboto Mono', monospace;
        }
        .back-link:hover {
            text-shadow: 0 0 10px var(--skaldy-purple);
        }
        h1 {
            color: var(--h-white);
            font-family: 'Roboto Mono', monospace;
            border-left: 4px solid var(--skaldy-purple);
            padding-left: 15px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .date {
            color: var(--skaldy-purple);
            font-family: 'Roboto Mono', monospace;
            margin-bottom: 40px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        h2, h3 {
            color: var(--h-white);
            font-family: 'Roboto Mono', monospace;
            margin-top: 40px;
            text-transform: uppercase;
        }
        code {
            background: rgba(123, 44, 191, 0.1);
            color: var(--skaldy-purple);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Roboto Mono', monospace;
        }
        pre {
            background: #111;
            border: 1px solid #333;
            padding: 20px;
            overflow-x: auto;
            color: #e0e0e0;
        }
        pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }
        a {
            color: var(--skaldy-purple);
            text-decoration: none;
        }
        a:hover {
            text-shadow: 0 0 10px var(--skaldy-purple);
        }
        blockquote {
            border-left: 2px solid #555;
            margin-left: 0;
            padding-left: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <article>
        <div class="logo-header">
            <a href="https://skaldy.net">
                <img src="/logo.png" alt="SKALDY Logo" class="logo">
            </a>
        </div>

        <a href="/intel" class="back-link"><< RETURN TO VAULT</a>
        <h1>{{ page.title }}</h1>
        <div class="date">LOG DATE: {{ page.date | date: "%Y-%m-%d" }}</div>
        
        <div class="content">
            {{ content }}
        </div>
    </article>
</body>
</html>
